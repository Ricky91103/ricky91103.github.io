<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharma-Link | Aegis AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Michroma&family=Space+Grotesk:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #020617; 
            color: #ffffff;
            margin: 0;
            height: 100vh;
            overflow: hidden; 
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: linear-gradient(to bottom, #0f172a 0%, #020617 100%);
        }

        /* Hero Image Container */
        .hero-bg-container {
            position: fixed;
            top: 50%; 
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            max-width: 480px; 
            z-index: -1;
            opacity: 0.95;
            pointer-events: none;
            -webkit-mask-image: radial-gradient(ellipse 70% 85% at 50% 40%, black 65%, rgba(0, 0, 0, 0.4) 90%, transparent 100%);
            mask-image: radial-gradient(ellipse 70% 85% at 50% 40%, black 65%, rgba(0, 0, 0, 0.4) 90%, transparent 100%);
            animation: floating 6s ease-in-out infinite;
        }

        @keyframes floating {
            0%, 100% { transform: translate(-50%, -50%) translateY(0px); }
            50% { transform: translate(-50%, -50%) translateY(-20px); }
        }

        .hero-image-fused {
            width: 100%;
            height: auto;
            object-fit: contain;
            filter: brightness(1.1) contrast(1.1) saturate(0.8);
        }

        /* Title Styling - CLEAN WHITE STATIC */
        #aegis-greeting {
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            display: inline-block;
            color: white;
            font-family: 'Michroma', sans-serif;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.1);
        }
        
        #aegis-greeting:hover {
            text-shadow: 0 0 20px rgba(34, 211, 238, 0.5);
        }

        /* ORB DESIGN - CLEAN BLUE GLOW */
        #aegis-orb-wrapper {
            position: relative;
            cursor: pointer;
        }

        #aegis-orb {
            width: 8rem;
            height: 8rem;
            border-radius: 9999px;
            background-color: #0a0a0a;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(34, 211, 238, 0.2);
            transition: all 0.7s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            position: relative;
            z-index: 20;
        }

        #aegis-orb-wrapper:hover #aegis-orb {
            transform: scale(1.05);
            border-color: #22d3ee;
            box-shadow: 0 0 40px rgba(34, 211, 238, 0.6);
        }

        .pulse-glow { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0.6); border-color: #22d3ee; }
            70% { box-shadow: 0 0 0 30px rgba(34, 211, 238, 0); border-color: rgba(34, 211, 238, 0.3); }
            100% { box-shadow: 0 0 0 0 rgba(34, 211, 238, 0); border-color: #22d3ee; }
        }

        /* HUD Elevation - LOWERED TO 8rem */
        .glass-ui-container {
            background: rgba(15, 23, 42, 0.5); 
            backdrop-filter: blur(5px);
            border: 1px solid rgba(34, 211, 238, 0.2);
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8);
        }

        /* Backronym Slide */
        .backronym-container {
            max-height: 0;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
        }

        .backronym-container.reveal {
            max-height: 60px;
            opacity: 1;
            margin-top: 5px;
        }

        #backronym-text {
            color: #ffffff;
            font-weight: 900; 
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        /* Access Gate Overlay */
        #access-gate {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(2, 6, 23, 0.98);
            backdrop-filter: blur(30px);
            display: flex;
            align-items: center; 
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: all 0.5s ease;
        }

        .show-gate {
            visibility: visible !important;
            opacity: 1 !important;
        }

        #handshake-input {
            background: transparent;
            border-bottom: 2px solid #22d3ee;
            color: #22d3ee;
            font-family: 'Orbitron', sans-serif;
            text-align: center;
            letter-spacing: 0.5em;
            outline: none;
            width: 300px;
            font-size: 24px;
            padding: 10px;
        }

        /* Right HUD (Facts) */
        .system-feed {
            border-left: 1px solid rgba(34, 211, 238, 0.2);
            padding-left: 1.5rem;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .metric-card {
            background: rgba(34, 211, 238, 0.05);
            border-radius: 12px;
            padding: 15px;
            border: 1px solid rgba(34, 211, 238, 0.1);
        }

        #fact-display {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            line-height: 1.6;
            color: #e2e8f0;
        }

        /* Floor Badges */
        #tech-badges {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 4rem;
            opacity: 0.4;
            z-index: 10;
            width: max-content;
        }
    </style>
</head>
<body class="p-6">

    <canvas id="bg-canvas"></canvas>

    <!-- Handshake Overlay -->
    <div id="access-gate">
        <div class="bg-slate-900 border border-cyan-500/30 text-center space-y-6 p-12 rounded-[2.5rem] max-w-lg w-full">
            <i class="fa-solid fa-shield-halved text-6xl text-cyan-400 animate-pulse"></i>
            <h2 class="font-['Orbitron'] font-bold tracking-[0.3em] text-cyan-400 text-sm uppercase">Encrypted Override</h2>
            <p class="text-[10px] text-slate-400 uppercase tracking-widest">Enter Password to Initiate Call</p>
            <input type="password" id="handshake-input" placeholder="•••••••••" autocomplete="off">
            <p id="gate-status" class="text-[9px] text-slate-500 uppercase tracking-widest pt-4">Verification Protocol Active</p>
        </div>
    </div>

    <div class="hero-bg-container">
        <img id="product-image" src="https://lh3.googleusercontent.com/d/1z5sK-gC7Tj0sec9YcRo_bE-R-_DFZ21J" alt="Aegis Background" class="hero-image-fused" />
    </div>

    <!-- Branding -->
    <div class="fixed top-10 left-10 z-30 pointer-events-none">
        <div class="flex flex-col items-start">
            <h1 class="font-['Orbitron'] text-[#22d3ee] text-3xl md:text-5xl font-black tracking-[0.15em] mb-0" style="text-shadow: 0 0 15px rgba(34,211,238,0.4)">PHARMA-LINK</h1>
            <p class="font-['Orbitron'] text-[#22d3ee] text-[10px] md:text-[12px] uppercase tracking-[0.4em] font-bold mt-1 opacity-80">Augmented Patient Interface</p>
        </div>
    </div>

    <!-- Main HUD (Sis-Kick Flex - Positioned Lower) -->
    <div id="main-hud" class="fixed bottom-[8rem] left-1/2 -translate-x-1/2 w-[95%] max-w-[1150px] z-20">
        <div class="glass-ui-container rounded-[40px] p-8 flex items-center gap-10">
            
            <!-- Left Side -->
            <div class="flex flex-col md:flex-row items-center gap-10 flex-[1.6] relative">
                <div id="aegis-orb-wrapper" class="flex-shrink-0">
                    <div id="aegis-orb">
                        <img src="https://lh3.googleusercontent.com/d/1qGH5yISE0wQ4dkntal8jjclXoeSxGjLd" class="w-full h-full object-cover" />
                    </div>
                </div>

                <div class="flex-grow text-center md:text-left space-y-2">
                    <div id="aegis-title-area">
                        <h2 id="aegis-greeting" class="text-5xl font-black tracking-tight italic" onclick="window.revealBackronym()">Æ-GiS</h2>
                        <div id="backronym-wrap" class="backronym-container">
                            <p id="backronym-text">Augmented Entity for Generative info. & Safety</p>
                        </div>
                    </div>
                    <div class="pt-2">
                        <button id="vapi-button" class="group relative px-12 py-4 bg-white text-black font-black rounded-2xl active:scale-95 flex items-center justify-center space-x-4 shadow-xl transition-all hover:bg-cyan-400 hover:shadow-cyan-400/50" onclick="window.handleCallInitiation()">
                            <span id="btn-text" class="uppercase tracking-tighter text-lg font-bold">Initialize Call</span>
                            <i class="fa-solid fa-bolt-lightning text-xl"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Side (Facts) -->
            <div class="hidden md:flex flex-col gap-3 flex-1 system-feed">
                <div class="flex justify-between items-center">
                    <p class="text-[10px] text-cyan-400 font-bold tracking-[0.2em] uppercase">Neural Data Stream</p>
                    <span class="w-2 h-2 bg-cyan-400 rounded-full animate-pulse"></span>
                </div>
                <div class="metric-card">
                    <p id="fact-display" class="italic">Synchronizing intelligence...</p>
                </div>
            </div>
            
            <div id="vapi-status" class="absolute top-6 right-10 text-[10px] font-mono text-cyan-400 uppercase tracking-[0.4em] opacity-0 flex items-center gap-2">
                <span class="w-2.5 h-2.5 bg-cyan-400 rounded-full animate-pulse"></span>Link Encrypted
            </div>
        </div>
    </div>

    <!-- Tech Badges -->
    <div id="tech-badges">
        <div class="flex items-center gap-2 text-cyan-500"><i class="fa-solid fa-network-wired"></i><span class="text-[9px] font-bold uppercase tracking-widest text-white">NFC-Grid</span></div>
        <div class="flex items-center gap-2 text-white"><i class="fa-solid fa-lock"></i><span class="text-[9px] font-bold uppercase tracking-widest text-white">Blockchain Verified</span></div>
        <div class="flex items-center gap-2 text-cyan-500"><i class="fa-solid fa-dna"></i><span class="text-[9px] font-bold uppercase tracking-widest text-white">Vigilance</span></div>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/index.js"></script>
    <script>
        // --- 1. GLOBAL SCOPE LOGIC ---
        const SECRET = "662607004";
        const ASST_ID = "43494331-d413-4224-aebf-94d7398b2c08";
        const VAPI_KEY = "3acda119-a85a-4962-addb-a695a2472dd3";
        let isCallActive = false;
        let vapiInstance = null;

        const medicalFacts = [
            "Your liver is the only organ capable of complete regeneration.",
            "Brain cells can hold 5x as much info as the Encyclopedia Britannica.",
            "Stomach acid is strong enough to dissolve razor blades; mucus protects you.",
            "Information travels along nerves at speeds reaching 400 km/h.",
            "The heart pumps 2,000 gallons of blood daily through 100,000 miles of vessels.",
            "Your cornea is the only body part without a blood supply; it breathes air directly.",
            "70% of your immune system is located in your gut microbiome.",
            "Your skeleton isn't dry; it is approximately 31% water by mass.",
            "A Broken Heart (Takotsubo) is a real medical condition that can be fatal.",
            "Adrenaline can grant 'Hysterical Strength,' allowing humans to lift cars."
        ];

        window.revealBackronym = function() {
            const wrap = document.getElementById('backronym-wrap');
            if(!wrap) return;
            wrap.classList.add('reveal');
            setTimeout(() => wrap.classList.remove('reveal'), 3000);
        };

        window.toggleGate = function(show) {
            const gate = document.getElementById('access-gate');
            if (show) gate.classList.add('show-gate');
            else gate.classList.remove('show-gate');
        };

        window.handleCallInitiation = function() {
            if (sessionStorage.getItem('aegis_auth') !== 'true') {
                window.toggleGate(true);
            } else {
                window.triggerVapi();
            }
        };

        window.triggerVapi = function() {
            if (!isCallActive) vapiInstance.start(ASST_ID);
            else vapiInstance.stop();
        };

        // --- 2. ENGINE INIT ---
        document.addEventListener('DOMContentLoaded', () => {
            const factBox = document.getElementById('fact-display');
            if(factBox) {
                factBox.innerText = medicalFacts[Math.floor(Math.random() * medicalFacts.length)];
            }

            vapiInstance = window.vapiSDK || new window.Vapi(VAPI_KEY);
            const handshake = document.getElementById('handshake-input');
            const orb = document.getElementById('aegis-orb');

            handshake.addEventListener('input', (e) => {
                if (e.target.value === SECRET) {
                    const status = document.getElementById('gate-status');
                    status.innerText = "ACCESS GRANTED. INITIALIZING...";
                    status.style.color = "#4ade80";
                    sessionStorage.setItem('aegis_auth', 'true');
                    setTimeout(() => {
                        window.toggleGate(false);
                        window.triggerVapi();
                    }, 1000);
                }
            });

            vapiInstance.on('call-start', () => {
                isCallActive = true;
                document.getElementById('btn-text').innerText = "Terminate";
                const btn = document.getElementById('vapi-button');
                btn.classList.replace('bg-white', 'bg-red-600'); btn.classList.add('text-white');
                orb.classList.add('pulse-glow');
                document.getElementById('vapi-status').style.opacity = "1";
                document.getElementById('aegis-greeting').innerText = "Æ-GiS [ON]";
            });

            vapiInstance.on('call-end', () => {
                isCallActive = false;
                document.getElementById('btn-text').innerText = "Initialize Call";
                const btn = document.getElementById('vapi-button');
                btn.classList.replace('bg-red-600', 'bg-white'); btn.classList.remove('text-white');
                orb.classList.remove('pulse-glow');
                document.getElementById('aegis-greeting').innerText = "Æ-GiS";
            });

            vapiInstance.on('volume-level', (l) => { 
                if(orb) orb.style.transform = `scale(${1 + l*1.5})`; 
            });
        });

        // --- 3. BACKGROUND PERSISTENT (THE BOUNCING WING HEXAGONS) ---
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        const m = { x: -2000, y: -2000 };
        window.addEventListener('mousemove', (e) => { m.x = e.clientX; m.y = e.clientY; });
        let parts = [];
        function res() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', res); res();

        class Particle {
            constructor() {
                // ORIGIN: 80px North of Center (Aegis Wings)
                this.x = canvas.width / 2;
                this.y = canvas.height / 2 - 80;
                
                this.s = Math.random() * 1.5 + 2; 
                const a = Math.random() * Math.PI * 2;
                
                // DRIFT: 0.35 rate away from center
                this.vx = Math.cos(a) * 0.35; 
                this.vy = Math.sin(a) * 0.35;
                
                this.ax = 0; this.ay = 0; 
                this.c = Math.random() > 0.5 ? "34, 211, 238" : "255, 255, 255";
                this.al = 0; this.ta = Math.random() > 0.5 ? 0.14 : 0.09;
                this.po = Math.random() * Math.PI * 2; 
                this.pf = 0.001 + Math.random() * 0.003;
                this.lk = 0;
            }
            up() {
                if(this.al < this.ta) this.al += 0.0008;
                const dx = this.x - m.x, dy = this.y - m.y, d2 = dx*dx + dy*dy;
                if(d2 < 12100) {
                    const f = (110 - Math.sqrt(d2)) / 110; 
                    const an = Math.atan2(dy, dx);
                    this.ax += Math.cos(an) * f * 0.4; 
                    this.ay += Math.sin(an) * f * 0.4;
                }
                this.x += this.vx + this.ax; this.y += this.vy + this.ay;
                this.ax *= 0.94; this.ay *= 0.94;
                
                // BOUNCE LOGIC (Strict screen boundaries)
                if(this.x <= this.s) { this.vx = Math.abs(this.vx); this.x = this.s; }
                if(this.x >= canvas.width - this.s) { this.vx = -Math.abs(this.vx); this.x = canvas.width - this.s; }
                if(this.y <= this.s) { this.vy = Math.abs(this.vy); this.y = this.s; }
                if(this.y >= canvas.height - this.s) { this.vy = -Math.abs(this.vy); this.y = canvas.height - this.s; }
            }
            dr() {
                const pulseEffect = Math.sin(Date.now() * this.pf + this.po) * 0.1;
                let a = Math.max(0, this.al + pulseEffect);
                if(this.lk > 1) { ctx.shadowBlur = 15; ctx.shadowColor = `rgba(${this.c},0.8)`; a = Math.min(0.9, a + 0.4); }
                ctx.fillStyle = `rgba(${this.c},${a})`; ctx.beginPath();
                for(let i=0; i<6; i++){
                    const px = this.x + this.s * Math.cos(i * Math.PI / 3); 
                    const py = this.y + this.s * Math.sin(i * Math.PI / 3); 
                    if(i==0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.closePath(); ctx.fill(); ctx.shadowBlur = 0;
            }
        }
        function drawCon() {
            parts.forEach(p => p.lk = 0);
            for(let i=0; i<parts.length; i++){
                for(let j=i+1; j<parts.length; j++){
                    const p1 = parts[i], p2 = parts[j], dx = p1.x - p2.x, dy = p1.y - p2.y, d2 = dx*dx + dy*dy;
                    if(d2 < 9025){
                        p1.lk++; p2.lk++; const sp = Math.sin(Date.now() * 0.005 + (p1.po + p2.po) / 2) * 0.2 + 0.8;
                        const a = (1 - Math.sqrt(d2) / 95) * 0.4 * sp * Math.min(p1.al + 0.2, p2.al + 0.2);
                        ctx.beginPath(); ctx.lineWidth = 2; ctx.strokeStyle = `rgba(34,211,238,${a})`;
                        ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                }
            }
        }
        let t = 0;
        function loop() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if(parts.length < 400) { t++; if(t % 22 == 0) parts.push(new Particle()); }
            drawCon(); parts.forEach(p => { p.up(); p.dr(); }); requestAnimationFrame(loop);
        }
        loop();
    </script>
</body>
</html>
